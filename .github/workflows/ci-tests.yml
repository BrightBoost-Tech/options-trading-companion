name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Placeholder values ONLY. Never set real secrets here.
  # Real credentials would expose CI to leaks via logs/PR diffs.
  # Tests requiring real services must mock them or use
  # @pytest.mark.skip(reason="...; tracked in #NNN") with a tracking issue link.
  SUPABASE_URL: "https://fake.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "fake_service_role_key_for_tests"
  ALPACA_API_KEY: "fake_alpaca_key"
  ALPACA_SECRET_KEY: "fake_alpaca_secret"
  POLYGON_API_KEY: "fake_polygon_key"
  TASK_SIGNING_KEYS: "kid1:fakesecretfortests"
  APP_ENV: "test"
  RISK_EQUITY_SOURCE: "legacy"
  TASK_NONCE_PROTECTION: "0"
  TASK_NONCE_FAIL_CLOSED_IN_PROD: "0"

jobs:
  pytest:
    name: pytest packages/quantum (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/quantum/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run pytest with coverage
        env:
          # Imports like `from packages.quantum.X import Y` resolve against
          # the repo root, not packages/quantum/. Set PYTHONPATH explicitly
          # so pytest collection succeeds regardless of pytest rootdir.
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest packages/quantum/tests/ \
            --cov=packages/quantum \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
