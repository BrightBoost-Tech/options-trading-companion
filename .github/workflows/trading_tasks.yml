# Trading Tasks - Security v4 HMAC Signed Requests
#
# This workflow calls /tasks/* endpoints with v4 HMAC signing.
# Schedules are in UTC but include Python time-gate for DST-aware Chicago time.
#
# Required Secrets:
#   TASK_SIGNING_KEYS  - Format: kid1:secret1,kid2:secret2
#   QUANTUM_BASE_URL   - API base URL (e.g., https://api.example.com)
#
# Optional Secrets:
#   USER_ID            - Run tasks for specific user only (preferred)
#   TASK_USER_ID       - Legacy fallback for USER_ID

name: Trading Tasks (v4 Signed)

on:
  schedule:
    # Suggestions Close - 8:00 AM Chicago
    # CDT (summer): 13:00 UTC | CST (winter): 14:00 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '0 13 * * 1-5'
    - cron: '0 14 * * 1-5'

    # Suggestions Open - 11:00 AM Chicago
    # CDT (summer): 16:00 UTC | CST (winter): 17:00 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '0 16 * * 1-5'
    - cron: '0 17 * * 1-5'

    # Learning Ingest - 4:10 PM Chicago
    # CDT (summer): 21:10 UTC | CST (winter): 22:10 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '10 21 * * 1-5'
    - cron: '10 22 * * 1-5'

    # Paper Learning Ingest - 4:20 PM Chicago (after exit evaluator + MTM + learning_ingest)
    # CDT (summer): 21:20 UTC | CST (winter): 22:20 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '20 21 * * 1-5'
    - cron: '20 22 * * 1-5'

    # Ops Health Check - Every 30 min during market hours
    # Runs at :07 and :37 from 13:00-22:00 UTC (8 AM - 5 PM Chicago approx)
    # Uses :07/:37 to avoid cron collisions with other jobs at :00/:05/:10/:15/:30/:40
    - cron: '7,37 13-22 * * 1-5'

    # Validation Eval (Checkpoint) - 9:30 AM Chicago (after paper_auto_close)
    # CDT (summer): 14:30 UTC | CST (winter): 15:30 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '30 14 * * 1-5'
    - cron: '30 15 * * 1-5'

    # Learning Ingest Nightly - 3:30 AM Chicago (deep night, Tue-Sat)
    # CDT (summer): 08:30 UTC | CST (winter): 09:30 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '30 08 * * 2-6'
    - cron: '30 09 * * 2-6'

    # Paper Auto-Execute - 11:30 AM Chicago (after suggestions/open)
    # CDT (summer): 16:30 UTC | CST (winter): 17:30 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '30 16 * * 1-5'
    - cron: '30 17 * * 1-5'

    # Paper Auto-Close - DISABLED: superseded by paper_exit_evaluate (condition-based exits)
    # + MTM unrealized P&L in checkpoint. Force-closing healthy positions destroys alpha.
    # Was: 9:00 AM Chicago (0 15 UTC)
    # - cron: '0 15 * * 1-5'

    # Shadow Checkpoint Midday - 1:00 PM Chicago (intraday pacing check)
    # CDT (summer): 18:00 UTC | CST (winter): 19:00 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '0 18 * * 1-5'
    - cron: '0 19 * * 1-5'

    # Shadow Checkpoint Afternoon - 4:00 PM Chicago (pre-close pacing check)
    # CDT (summer): 21:02 UTC | CST (winter): 22:00 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    # CDT cron offset to :02 to avoid collision with paper_exit_evaluate CST at '0 21'
    - cron: '2 21 * * 1-5'
    - cron: '0 22 * * 1-5'

    # Cohort Eval Afternoon - 4:05 PM Chicago (multi-threshold analysis)
    # CDT (summer): 21:05 UTC | CST (winter): 22:05 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '5 21 * * 1-5'
    - cron: '5 22 * * 1-5'

    # Autopromote Cohort - 4:15 PM Chicago (after cohort eval)
    # CDT (summer): 21:15 UTC | CST (winter): 22:15 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '15 21 * * 1-5'
    - cron: '15 22 * * 1-5'

    # v4-L1F: Readiness Hardening Tasks

    # Validation Init Window - 8:40 AM Chicago (before suggestions-open)
    # CDT (summer): 13:40 UTC | CST (winter): 14:40 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '40 13 * * 1-5'
    - cron: '40 14 * * 1-5'

    # Validation Preflight Midday - 1:05 PM Chicago (intraday pacing check)
    # CDT (summer): 18:05 UTC | CST (winter): 19:05 UTC
    # Schedule BOTH; Python time-gate allows only the correct local-time run
    - cron: '5 18 * * 1-5'
    - cron: '5 19 * * 1-5'

    # Paper Exit Evaluator - 3:00 PM Chicago (condition-based exits before MTM)
    # CST (winter): 21:00 UTC | CDT (summer): 20:00 UTC
    - cron: '0 20 * * 1-5'
    - cron: '0 21 * * 1-5'

    # Paper Mark-to-Market - 3:30 PM Chicago (refresh marks on remaining positions)
    # CST (winter): 21:30 UTC | CDT (summer): 20:30 UTC
    - cron: '30 20 * * 1-5'
    - cron: '30 21 * * 1-5'

    # Paper Safety Close One - DISABLED: replaced by exit evaluator + MTM
    # Kept as comment for rollback reference.
    # Was: 5:00 PM Chicago (23:00 UTC)
    # - cron: '0 23 * * 1-5'

  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        type: choice
        options:
          - suggestions_close
          - suggestions_open
          - learning_ingest
          - universe_sync
          - morning_brief
          - midday_scan
          - weekly_report
          - validation_eval
          - strategy_autotune
          - ops_health_check
          - paper_auto_execute
          - paper_auto_close
          - paper_exit_evaluate
          - paper_mark_to_market
          - paper_process_orders
          - paper_learning_ingest
          - validation_shadow_eval
          - validation_cohort_eval
          - validation_autopromote_cohort
          - validation_preflight
          - validation_init_window
      skip_time_gate:
        description: 'Skip time gate check'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (print request without sending)'
        required: false
        type: boolean
        default: false
      skip_sync:
        description: 'Skip holdings sync (for suggestions_open/close)'
        required: false
        type: boolean
        default: false
      force_rerun:
        description: 'Force a new JobRun even if one exists today (for debugging)'
        required: false
        type: boolean
        default: false
      payload_json:
        description: 'Custom JSON payload (overrides defaults, e.g. {"skip_sync":true})'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # Scheduled: Suggestions Close (8 AM Chicago)
  # ============================================================================
  suggestions-close:
    name: Suggestions Close (8 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 13 * * 1-5' || github.event.schedule == '0 14 * * 1-5')
    concurrency:
      group: trading-suggestions-close-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Suggestions Close
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py suggestions_close --scheduled-local-time 08:00

  # ============================================================================
  # Scheduled: Suggestions Open (11 AM Chicago)
  # ============================================================================
  suggestions-open:
    name: Suggestions Open (11 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 16 * * 1-5' || github.event.schedule == '0 17 * * 1-5')
    concurrency:
      group: trading-suggestions-open-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Suggestions Open
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py suggestions_open --scheduled-local-time 11:00

  # ============================================================================
  # Scheduled: Learning Ingest (4:10 PM Chicago)
  # ============================================================================
  learning-ingest:
    name: Learning Ingest (4:10 PM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '10 21 * * 1-5' || github.event.schedule == '10 22 * * 1-5')
    concurrency:
      group: trading-learning-ingest-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Learning Ingest
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py learning_ingest --scheduled-local-time 16:10

  # ============================================================================
  # Scheduled: Ops Health Check (every 30 min)
  # ============================================================================
  ops-health-check:
    name: Ops Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '7,37 13-22 * * 1-5'
    concurrency:
      group: trading-ops-health-check-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Ops Health Check
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
        run: |
          python scripts/run_signed_task.py ops_health_check --skip-time-gate

  # ============================================================================
  # Manual Dispatch: Any Task
  # ============================================================================
  manual-task:
    name: Manual Task (${{ inputs.task }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Task
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          PAYLOAD_JSON: ${{ inputs.payload_json }}
          # Enable verbose response JSON for paper tasks (debugging stuck orders)
          PRINT_RESPONSE_JSON: ${{ contains(fromJSON('["paper_process_orders","paper_auto_execute","paper_auto_close","paper_safety_close_one"]'), inputs.task) && '1' || '0' }}
        run: |
          ARGS="${{ inputs.task }}"
          if [ "${{ inputs.skip_time_gate }}" = "true" ]; then
            ARGS="$ARGS --skip-time-gate"
          fi
          # Pass skip_sync flag if checked
          if [ "${{ inputs.skip_sync }}" = "true" ]; then
            ARGS="$ARGS --skip-sync"
          fi
          # Pass force_rerun flag if checked (creates new JobRun even if one exists today)
          if [ "${{ inputs.force_rerun }}" = "true" ]; then
            ARGS="$ARGS --force-rerun"
          fi
          # Pass custom payload JSON only if non-empty (use env var to avoid YAML injection)
          if [ -n "$PAYLOAD_JSON" ]; then
            python scripts/run_signed_task.py $ARGS --payload-json "$PAYLOAD_JSON"
          else
            python scripts/run_signed_task.py $ARGS
          fi

  # ============================================================================
  # Scheduled: Validation Eval / Checkpoint (9:30 AM Chicago)
  # ============================================================================
  validation-eval:
    name: Validation Eval (9:30 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '30 14 * * 1-5' || github.event.schedule == '30 15 * * 1-5')
    concurrency:
      group: trading-validation-eval-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Validation Eval
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py validation_eval --scheduled-local-time 09:30

  # ============================================================================
  # Scheduled: Learning Ingest Nightly (3:30 AM Chicago, Tue-Sat)
  # ============================================================================
  learning-ingest-nightly:
    name: Learning Ingest Nightly (3:30 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '30 08 * * 2-6' || github.event.schedule == '30 09 * * 2-6')
    concurrency:
      group: trading-learning-ingest-nightly-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Learning Ingest Nightly
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py learning_ingest --scheduled-local-time 03:30

  # ============================================================================
  # Scheduled: Paper Learning Ingest (4:20 PM Chicago)
  # ============================================================================
  paper-learning-ingest:
    name: Paper Learning Ingest (4:20 PM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '20 21 * * 1-5' || github.event.schedule == '20 22 * * 1-5')
    concurrency:
      group: trading-paper-learning-ingest-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Paper Learning Ingest
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py paper_learning_ingest --scheduled-local-time 16:20

  # ============================================================================
  # Scheduled: Paper Auto-Execute (11:30 AM Chicago)
  # ============================================================================
  paper-auto-execute:
    name: Paper Auto-Execute (11:30 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '30 16 * * 1-5' || github.event.schedule == '30 17 * * 1-5')
    concurrency:
      group: trading-paper-auto-execute-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Paper Auto-Execute
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py paper_auto_execute --scheduled-local-time 11:30

  # ============================================================================
  # DISABLED: Paper Auto-Close — superseded by paper_exit_evaluate + MTM
  # Kept for manual dispatch only (workflow_dispatch). Cron disabled above.
  # ============================================================================
  paper-auto-close:
    name: Paper Auto-Close (DISABLED - manual only)
    runs-on: ubuntu-latest
    if: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Paper Auto-Close
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py paper_auto_close

  # ============================================================================
  # Scheduled: Shadow Checkpoint Midday (1:00 PM Chicago)
  # ============================================================================
  validation-shadow-midday:
    name: Shadow Checkpoint Midday (1:00 PM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 18 * * 1-5' || github.event.schedule == '0 19 * * 1-5')
    concurrency:
      group: trading-shadow-midday-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Shadow Checkpoint Midday
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py validation_shadow_eval --scheduled-local-time 13:00

  # ============================================================================
  # Scheduled: Shadow Checkpoint Afternoon (4:00 PM Chicago)
  # ============================================================================
  validation-shadow-afternoon:
    name: Shadow Checkpoint Afternoon (4:00 PM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '2 21 * * 1-5' || github.event.schedule == '0 22 * * 1-5')
    concurrency:
      group: trading-shadow-afternoon-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Shadow Checkpoint Afternoon
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          python scripts/run_signed_task.py validation_shadow_eval --scheduled-local-time 16:00

  # ============================================================================
  # Scheduled: Cohort Eval Afternoon (4:05 PM Chicago)
  # ============================================================================
  validation-cohort-afternoon:
    name: Cohort Eval Afternoon (4:05 PM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '5 21 * * 1-5' || github.event.schedule == '5 22 * * 1-5')
    concurrency:
      group: trading-cohort-afternoon-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
