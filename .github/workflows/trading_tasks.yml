# Trading Tasks - Security v4 HMAC Signed Requests
#
# This workflow calls /tasks/* endpoints with v4 HMAC signing.
# Schedules are in UTC but include Python time-gate for DST-aware Chicago time.
# Each time-sensitive job has dual crons (CDT + CST) with --expected-chicago-offset
# to reject the wrong-season cron automatically.
#
# ═══════════════════════════════════════════════════════════════════
# DAILY SCHEDULE (All times Chicago)
# ═══════════════════════════════════════════════════════════════════
# OVERNIGHT
#   3:30 AM  — learning_ingest (nightly catch-up, Tue-Sat)
#   5:00 AM  — calibration_update (recompute EV/PoP adjustments)
#   5:30 AM  — walk_forward_autotune (weekly parameter optimization, Mon)
#
# MORNING
#   8:00 AM  — suggestions_close (exit suggestions for existing positions)
#   8:15 AM  — paper_exit_evaluate (overnight gap protection)
#   8:40 AM  — validation_init_window (DEPRECATED)
#
# MID-MORNING
#   9:30 AM  — validation_eval (DEPRECATED — replaced by daily_progression_eval)
#
# MIDDAY
#  11:00 AM  — suggestions_open (midday entry generation)
#  11:30 AM  — paper_auto_execute (execute top suggestions)
#
# EARLY AFTERNOON
#   1:00 PM  — validation_shadow_eval (midday pacing, read-only)
#   1:05 PM  — validation_preflight (DEPRECATED)
#
# CLOSE
#   3:00 PM  — paper_exit_evaluate (condition-based exits)
#   3:30 PM  — paper_mark_to_market (refresh position marks)
#
# END OF DAY
#   4:00 PM  — validation_shadow_eval (afternoon pacing, read-only)
#   4:05 PM  — validation_cohort_eval (multi-threshold analysis)
#   4:10 PM  — learning_ingest (executed trades → learning)
#   4:15 PM  — validation_autopromote_cohort (auto-promote best cohort)
#   4:20 PM  — paper_learning_ingest (paper outcomes → learning)
#   4:30 PM  — policy_lab_eval (cohort comparison) [POLICY_LAB_ENABLED]
#
# CONTINUOUS
#   */5      — alpaca_order_sync (every 5 min, poll Alpaca for fills)
#   :07/:37  — ops_health_check (every 30 min, 8 AM–5 PM)
# ═══════════════════════════════════════════════════════════════════
#
# Required Secrets:
#   TASK_SIGNING_KEYS  - Format: kid1:secret1,kid2:secret2
#   QUANTUM_BASE_URL   - API base URL (e.g., https://api.example.com)
#
# Optional Secrets:
#   USER_ID            - Run tasks for specific user only (preferred)
#   TASK_USER_ID       - Legacy fallback for USER_ID

name: Trading Tasks (v4 Signed)

on:
  # ═══════════════════════════════════════════════════════════════════
  # CRON SCHEDULES REMOVED — All jobs now triggered by APScheduler
  # (packages/quantum/scheduler.py) running inside the web service.
  # APScheduler fires within seconds vs GitHub Actions' 60-90min delays.
  #
  # This workflow is now MANUAL DISPATCH ONLY — use workflow_dispatch
  # to trigger jobs on demand for debugging/recovery.
  #
  # APScheduler schedule (all Chicago time, Mon-Fri):
  #   8:00 AM  suggestions_close
  #   8:15 AM  paper_exit_evaluate (morning)
  #   11:00 AM suggestions_open
  #   11:30 AM paper_auto_execute
  #   3:00 PM  paper_exit_evaluate (afternoon)
  #   3:30 PM  paper_mark_to_market
  #   4:00 PM  daily_progression_eval
  #   4:10 PM  learning_ingest
  #   4:20 PM  paper_learning_ingest
  #   */5 min  alpaca_order_sync (9 AM-4 PM)
  #   :07/:37  ops_health_check (8 AM-5 PM)
  #
  # Enable with: SCHEDULER_ENABLED=1 in Railway
  # ═══════════════════════════════════════════════════════════════════

  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        type: choice
        options:
          - suggestions_close
          - suggestions_open
          - learning_ingest
          - universe_sync
          - morning_brief
          - midday_scan
          - weekly_report
          - validation_eval
          - daily_progression_eval
          - alpaca_order_sync
          - strategy_autotune
          - walk_forward_autotune
          - ops_health_check
          - paper_auto_execute
          - paper_auto_close
          - paper_exit_evaluate
          - paper_mark_to_market
          - paper_process_orders
          - paper_learning_ingest
          - validation_shadow_eval
          - validation_cohort_eval
          - validation_autopromote_cohort
          - validation_preflight
          - validation_init_window
          - policy_lab_eval
      skip_time_gate:
        description: 'Skip time gate check'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (print request without sending)'
        required: false
        type: boolean
        default: false
      skip_sync:
        description: 'Skip holdings sync (for suggestions_open/close)'
        required: false
        type: boolean
        default: false
      force_rerun:
        description: 'Force a new JobRun even if one exists today (for debugging)'
        required: false
        type: boolean
        default: false
      payload_json:
        description: 'Custom JSON payload (overrides defaults, e.g. {"skip_sync":true})'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # Scheduled: Suggestions Close (8 AM Chicago)
  # ============================================================================
  suggestions-close:
    name: Suggestions Close (8 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 13 * * 1-5' || github.event.schedule == '0 14 * * 1-5')
    concurrency:
      group: trading-suggestions-close-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Suggestions Close
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 13 * * 1-5" ]; then
            OFFSET="-05:00"
          else
            OFFSET="-06:00"
          fi
          python scripts/run_signed_task.py suggestions_close \
            --scheduled-local-time 08:00 \
            --expected-chicago-offset="$OFFSET" \
            --window-minutes 90

  # ============================================================================
  # Scheduled: Suggestions Open (11 AM Chicago)
  # ============================================================================
  suggestions-open:
    name: Suggestions Open (11 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 16 * * 1-5' || github.event.schedule == '0 17 * * 1-5')
    concurrency:
      group: trading-suggestions-open-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Suggestions Open
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 16 * * 1-5" ]; then
            OFFSET="-05:00"
          else
            OFFSET="-06:00"
          fi
          python scripts/run_signed_task.py suggestions_open \
            --scheduled-local-time 11:00 \
            --expected-chicago-offset="$OFFSET" \
            --window-minutes 90

  # ============================================================================
  # Scheduled: Learning Ingest (4:10 PM Chicago)
  # ============================================================================
  learning-ingest:
    name: Learning Ingest (4:10 PM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '10 21 * * 1-5' || github.event.schedule == '10 22 * * 1-5')
    concurrency:
      group: trading-learning-ingest-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Learning Ingest
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "10 21 * * 1-5" ]; then
            OFFSET="-05:00"
          else
            OFFSET="-06:00"
          fi
          python scripts/run_signed_task.py learning_ingest \
            --scheduled-local-time 16:10 \
            --expected-chicago-offset="$OFFSET" \
            --window-minutes 90

  # ============================================================================
  # Scheduled: Ops Health Check (every 30 min)
  # ============================================================================
  ops-health-check:
    name: Ops Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '7,37 13-22 * * 1-5'
    concurrency:
      group: trading-ops-health-check-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Ops Health Check
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
        run: |
          python scripts/run_signed_task.py ops_health_check --skip-time-gate

  # ============================================================================
  # Manual Dispatch: Any Task
  # ============================================================================
  manual-task:
    name: Manual Task (${{ inputs.task }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Task
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          PAYLOAD_JSON: ${{ inputs.payload_json }}
          # Enable verbose response JSON for paper tasks (debugging stuck orders)
          PRINT_RESPONSE_JSON: ${{ contains(fromJSON('["paper_process_orders","paper_auto_execute","paper_auto_close","paper_exit_evaluate","paper_mark_to_market"]'), inputs.task) && '1' || '0' }}
        run: |
          ARGS="${{ inputs.task }}"
          if [ "${{ inputs.skip_time_gate }}" = "true" ]; then
            ARGS="$ARGS --skip-time-gate"
          fi
          # Pass skip_sync flag if checked
          if [ "${{ inputs.skip_sync }}" = "true" ]; then
            ARGS="$ARGS --skip-sync"
          fi
          # Pass force_rerun flag if checked (creates new JobRun even if one exists today)
          if [ "${{ inputs.force_rerun }}" = "true" ]; then
            ARGS="$ARGS --force-rerun"
          fi
          # Pass custom payload JSON only if non-empty (use env var to avoid YAML injection)
          if [ -n "$PAYLOAD_JSON" ]; then
            python scripts/run_signed_task.py $ARGS --payload-json "$PAYLOAD_JSON"
          else
            python scripts/run_signed_task.py $ARGS
          fi

  # ============================================================================
  # Scheduled: Validation Eval / Checkpoint (9:30 AM Chicago)
  # ============================================================================
  validation-eval:
    name: Validation Eval (9:30 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '30 14 * * 1-5' || github.event.schedule == '30 15 * * 1-5')
    concurrency:
      group: trading-validation-eval-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
