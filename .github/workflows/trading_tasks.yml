          fi
          python scripts/run_signed_task.py learning_ingest \
            --scheduled-local-time 03:30 \
            --expected-chicago-offset="$OFFSET" \
            --window-minutes 90

  # ============================================================================
  # Scheduled: Calibration Update (5:00 AM Chicago, Tue-Sat)
  # ============================================================================
  calibration-update:
    name: Calibration Update (5:00 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '0 10 * * 2-6' || github.event.schedule == '0 11 * * 2-6')
