      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/quantum/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/quantum/requirements.txt

      - name: Run Validation Eval
        env:
          TASK_SIGNING_KEYS: ${{ secrets.TASK_SIGNING_KEYS }}
          BASE_URL: ${{ secrets.QUANTUM_BASE_URL }}
          USER_ID: ${{ secrets.USER_ID || secrets.TASK_USER_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "30 14 * * 1-5" ]; then
            OFFSET="-05:00"
          else
            OFFSET="-06:00"
          fi
          python scripts/run_signed_task.py validation_eval \
            --scheduled-local-time 09:30 \
            --expected-chicago-offset="$OFFSET" \
            --window-minutes 90

  # ============================================================================
  # Scheduled: Learning Ingest Nightly (3:30 AM Chicago, Tue-Sat)
  # ============================================================================
  learning-ingest-nightly:
    name: Learning Ingest Nightly (3:30 AM Chicago)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && (github.event.schedule == '30 08 * * 2-6' || github.event.schedule == '30 09 * * 2-6')
